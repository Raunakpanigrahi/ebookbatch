<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' blob: data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-eval' 'unsafe-inline' blob: data:;" />
  <title>Ebook Batch Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Background Glow Blobs -->
  <div class="bg-glow">
    <div class="glow-blob glow-blob--purple"></div>
    <div class="glow-blob glow-blob--blue"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════════
     TITLE BAR (custom, draggable)
════════════════════════════════════════════════════════════════════════════ -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag"></div>
    <div class="titlebar-title">
      <span class="titlebar-icon">⬡</span>
      Ebook Batch Converter
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize" title="Minimize">—</button>
      <button class="titlebar-btn" id="btn-maximize" title="Maximize">⬜</button>
      <button class="titlebar-btn titlebar-btn--close" id="btn-close" title="Close">✕</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════════
     SIDEBAR
════════════════════════════════════════════════════════════════════════════ -->
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="var(--accent)" />
            <path d="M7 8h9M7 12h12M7 16h8M7 20h10" stroke="white" stroke-width="1.8" stroke-linecap="round" />
            <path d="M20 14l3 3-3 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div>
          <div class="sidebar-app-name">EbookBatch</div>
          <div class="sidebar-version" id="app-version">v1.0.0</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="home">
          <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></span>
          <span class="nav-label">Home</span>
        </button>
        <button class="nav-item" data-view="library">
          <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg></span>
          <span class="nav-label">Library</span>
        </button>
        <button class="nav-item" data-view="collections">
          <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg></span>
          <span class="nav-label">Collections</span>
        </button>
        <button class="nav-item" data-view="recent">
          <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></span>
          <span class="nav-label">Recently Read</span>
        </button>
        <button class="nav-item" data-view="favorites">
          <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></span>
          <span class="nav-label">Favorites</span>
        </button>
      </nav>

      <div class="sidebar-footer" style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
        <button class="nav-item" data-view="settings">
          <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></span>
          <span class="nav-label">Settings</span>
        </button>
      </div>
    </aside>

    <!-- ═════════════════════════════════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════════════════════════════════ -->
    <main class="main-content">
      <div id="page-home" class="page-view active">
        <h1 class="page-title">Home</h1>
        
        <!-- Empty State Container -->
        <div id="home-empty-state" class="home-empty-state hidden">
          <div class="empty-icon-wrapper">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"></path>
              <line x1="12" y1="8" x2="12" y2="16"></line>
              <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
          </div>
          <h2 class="empty-title">No books in your library yet.</h2>
          
          <div class="empty-actions" style="display: flex; gap: 16px; justify-content: center; align-items: center;">
            <button class="btn btn--primary btn--large" id="btn-home-add-files" style="pointer-events: auto;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
              Add Files
            </button>
            <button class="btn btn--outline btn--large" id="btn-home-add-folder" style="pointer-events: auto;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
              Add Folder
            </button>
          </div>
        </div>

        <div id="home-dashboard" class="home-dashboard">
          <section class="home-section">
            <h2 class="section-title">Recent Reads</h2>
            <div class="book-carousel" id="home-recent-grid"></div>
          </section>
          <section class="home-section">
            <div class="section-header">
              <h2 class="section-title">Favorite Books</h2>
              <button class="btn btn--ghost btn--sm" data-goto="favorites">See more ></button>
            </div>
            <div class="book-carousel" id="home-favorites-row"></div>
          </section>
          <section class="home-section">
            <div class="section-header">
              <h2 class="section-title">Recently Added Books</h2>
              <button class="btn btn--ghost btn--sm" data-goto="library">See more ></button>
            </div>
            <div class="book-carousel" id="home-recent-added-row"></div>
          </section>
        </div>
      </div>

      <div id="page-library" class="page-view hidden">
        <div class="toolbar" id="toolbar">
          <div class="toolbar-left">
            <div class="search-box">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              <input type="text" id="search-input" placeholder="Search books, authors..." />
            </div>
          </div>
          <div class="toolbar-right">
            <div class="toolbar-filters">
              <label>Sort by:</label>
              <select id="library-sort" class="dropdown-filter">
                <option value="name">Title</option>
                <option value="author">Author</option>
                <option value="dateAdded" selected>Date Added</option>
              </select>
              <label>Format:</label>
              <button class="filter-tab active" data-filter="all">All</button>
              <button class="filter-tab" data-filter="pdf">PDF</button>
              <button class="filter-tab" data-filter="epub">EPUB</button>
            </div>
            <button class="btn btn--primary" id="btn-add-books" title="Import Ebooks">
              + Add Books
            </button>
          </div>
        </div>

        <div class="book-grid" id="library-grid"></div>

        <!-- Hidden elements required by existing script.js -->
        <div class="hidden">
          <div id="upload-area"></div>
          <div id="drop-zone"><div id="upload-zone-inner"></div></div>
          <div id="table-wrapper"><table id="file-table"><tbody id="file-table-body"></tbody></table></div>
          <button id="btn-select-folder"></button>
          <button id="btn-select-files"></button>
          <button id="btn-start-conversion"></button>
          <button id="btn-cancel-conversion"></button>
          <button id="btn-add-folder"></button>
          <button id="btn-add-files"></button>
          <span id="file-list-header-text"></span>
          <div id="table-empty"></div>
        </div>

        <!-- Warning Banner -->
        <div class="warning-banner hidden" id="warning-banner">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
            <line x1="12" y1="9" x2="12" y2="13" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
          <span id="warning-text"></span>
          <button class="warning-dismiss" id="btn-dismiss-warning">×</button>
        </div>
      </div>

      <div id="page-recent" class="page-view hidden">
        <h1 class="page-title">Recently Read</h1>
        <div class="book-grid" id="recent-grid"></div>
      </div>

      <div id="page-favorites" class="page-view hidden">
        <h1 class="page-title">Favorites</h1>
        <div class="book-grid" id="favorites-grid"></div>
      </div>

      <div id="page-collections" class="page-view hidden">
        <h1 class="page-title">Collections</h1>
        <div class="book-grid" id="collections-grid"></div>
      </div>

      <div id="page-settings" class="page-view hidden">
        <h1 class="page-title">Settings</h1>
        <div class="settings-panel">
          <div class="settings-group">
            <label>App Theme</label>
            <button class="theme-toggle" id="btn-theme" title="Toggle theme">
              <span class="theme-toggle-track">
                <span class="theme-toggle-thumb"></span>
              </span>
              <span id="theme-label">Light Mode</span>
            </button>
          </div>
        </div>
        
        <!-- Stats hidden for backward compatibility -->
        <div class="hidden">
           <span id="stat-total">0</span><span id="stat-converted">0</span><span id="stat-skipped">0</span><span id="stat-failed">0</span>
           <span id="session-status">Idle</span><span id="eta-display">—</span><span id="elapsed-display">—</span>
           <button id="btn-save-folder"></button><button id="btn-export-zip"></button>
        </div>
      </div>

      <!-- Global Progress Bar for Conversion -->
      <div class="progress-section hidden" id="progress-section">
        <div class="progress-header">
          <span class="progress-label" id="progress-label">Converting…</span>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          <div class="progress-glow" id="progress-glow" style="left:0%"></div>
        </div>
        <div class="progress-footer">
          <span id="progress-detail">0 / 0 files</span>
          <span id="progress-speed"></span>
        </div>
      </div>

      <!-- Book Card Template -->
      <template id="template-book-card">
        <div class="book-card">
          <div class="book-cover-container">
            <img class="book-cover" src="" alt="Cover" />
            <div class="book-cover-placeholder"></div>
            <div class="book-overlay">
              <button class="overlay-btn overlay-btn-read" title="Read"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg></button>
              <button class="overlay-btn overlay-btn-fav" title="Favorite"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></button>
              <button class="overlay-btn overlay-btn-remove" title="Remove"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
            </div>
            <div class="book-badges">
              <span class="badge-format">PDF</span>
              <span class="fav-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></span>
            </div>
          </div>
          <div class="progress-bar-small"><div class="progress-bar-fill"></div></div>
          <div class="book-info">
            <div class="book-title"></div>
            <div class="book-author">Unknown Author</div>
          </div>
        </div>
      </template>

    </main>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════════
     READER OVERLAY
════════════════════════════════════════════════════════════════════════════ -->
  <div class="reader-overlay hidden" id="reader-overlay" data-reader-theme="light">
    
    <!-- TOP TOOLBAR -->
    <div class="reader-toolbar">
      <div class="reader-toolbar-left">
        <button class="reader-btn" id="btn-reader-back" title="Back to Library (Esc)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <div class="reader-title" id="reader-title">Book Title</div>
      </div>
      
      <div class="reader-toolbar-right">
        <button class="reader-btn" id="btn-reader-search" title="Search">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <button class="reader-btn" id="btn-reader-bookmark" title="Bookmarks">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        </button>
        <button class="reader-btn" id="btn-reader-settings" title="Display Settings">
          <span style="font-weight:700; font-family: serif; font-size: 16px;">Tt</span>
        </button>
        <button class="reader-btn" id="btn-reader-theme-toggle" title="Toggle Theme (Light/Sepia/Dark)">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <button class="reader-btn" id="btn-reader-fullscreen" title="Fullscreen">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        </button>
      </div>
    </div>

    <!-- Reader Settings Panel (Relative to Top-Right) -->
    <div class="reader-settings-panel hidden" id="reader-settings-panel">
      <div class="settings-group">
        <label>Theme</label>
        <div class="theme-options">
          <button class="theme-option" data-theme="light" style="background:#ffffff; color:#1a1a1a; border-color:#e0e0e0;">Light</button>
          <button class="theme-option" data-theme="sepia" style="background:#f4ecd8; color:#5b4636; border-color:#e0d6c1;">Sepia</button>
          <button class="theme-option" data-theme="dark" style="background:#1a1a1a; color:#e2e2ea; border-color:#333;">Dark</button>
        </div>
      </div>
      <div class="settings-group">
        <label>Font Family</label>
        <select id="reader-font-family" class="dropdown-filter" style="width:100%; margin-bottom: 8px;">
          <option value="Georgia">Georgia</option>
          <option value="Merriweather">Merriweather</option>
          <option value="'Libre Baskerville'">Libre Baskerville</option>
          <option value="'Times New Roman'">Times New Roman</option>
          <option value="Inter">Inter</option>
        </select>
        <label style="margin-top: 8px;">Line Spacing</label>
        <select id="reader-line-spacing" class="dropdown-filter" style="width:100%;">
          <option value="1.4">1.4</option>
          <option value="1.6" selected>1.6</option>
          <option value="1.8">1.8</option>
        </select>
      </div>
      <div class="settings-group">
        <label>Font Size</label>
        <div class="font-size-controls">
          <button class="font-btn" id="btn-font-decrease">A-</button>
          <span id="font-size-display">100%</span>
          <button class="font-btn" id="btn-font-increase">A+</button>
        </div>
      </div>
    </div>

    <!-- MAIN VIEWPORT -->
    <div class="reader-viewport">
       <div class="nav-overlay nav-left" id="reader-nav-left" title="Previous Page"></div>
       
       <!-- Content Column Wrapper -->
       <div class="reader-content-wrapper" id="reader-content-wrapper">
         <div id="reader-content"></div>
       </div>
       
       <div class="nav-overlay nav-right" id="reader-nav-right" title="Next Page"></div>
    </div>

    <!-- FOOTER STATUS BAR -->
    <div class="reader-footer-status">
       <div class="status-left"><span id="reader-chapter-title">Starting reading...</span></div>
       <div class="status-center">
         <span id="reader-page-info"></span>
         <!-- Hidden PDF Specific Controls mapped for compatibility -->
         <span class="hidden" id="pdf-controls">
            <span id="btn-zoom-out"></span><span id="pdf-zoom-level"></span><span id="btn-zoom-in"></span>
         </span>
       </div>
       <div class="status-right"><span id="reader-progress-pct">0%</span></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════════
     TOAST CONTAINER
════════════════════════════════════════════════════════════════════════════ -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Hidden file input for individual file selection -->
  <input type="file" id="file-input" multiple accept=".pdf,.epub" style="display:none" />

  <script src="../node_modules/pdfjs-dist/build/pdf.min.js"></script>
  <script src="../node_modules/jszip/dist/jszip.min.js"></script>
  <script src="../node_modules/epubjs/dist/epub.min.js"></script>
  <script src="script.js" defer></script>
</body>

</html>
